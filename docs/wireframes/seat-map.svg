<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="620" fill="#ffffff" stroke="#bbbbbb" />

  <!-- header -->
  <text x="450" y="45" font-size="16" fill="#333333" text-anchor="middle">Movie Title</text>
  <text x="450" y="65" font-size="10" fill="#999999" text-anchor="middle">Date · Time · Studio · Price / seat</text>

  <!-- screen -->
  <path d="M300,100 Q450,80 600,100" fill="none" stroke="#999999" stroke-width="3" />
  <text x="450" y="95" font-size="9" fill="#aaaaaa" text-anchor="middle">screen</text>

  <!-- seat grid: rows A-F, 8 columns -->
  <g stroke="#999999" fill="none">
    <!-- row labels + seats -->
    <g font-size="9" fill="#888888">
      <text x="260" y="145">A</text>
      <text x="260" y="175">B</text>
      <text x="260" y="205">C</text>
      <text x="260" y="235">D</text>
      <text x="260" y="265">E</text>
      <text x="260" y="295">F</text>
    </g>
    <!-- 6 rows x 8 seats as squares; two squares filled solid = booked, one hatched = selected -->
    <g transform="translate(280,130)">
      <!-- row A -->
      <rect x="0" y="0" width="14" height="14" fill="#dddddd" stroke="none" />
      <rect x="20" y="0" width="14" height="14" fill="#dddddd" stroke="none" />
      <rect x="40" y="0" width="14" height="14" />
      <rect x="60" y="0" width="14" height="14" />
      <rect x="80" y="0" width="14" height="14" />
      <rect x="100" y="0" width="14" height="14" />
      <rect x="120" y="0" width="14" height="14" />
      <rect x="140" y="0" width="14" height="14" />
      <!-- row B -->
      <g transform="translate(0,30)">
        <rect x="0" y="0" width="14" height="14" />
        <rect x="20" y="0" width="14" height="14" />
        <rect x="40" y="0" width="14" height="14" />
        <rect x="60" y="0" width="14" height="14" />
        <rect x="80" y="0" width="14" height="14" />
        <rect x="100" y="0" width="14" height="14" />
        <rect x="120" y="0" width="14" height="14" />
        <rect x="140" y="0" width="14" height="14" />
      </g>
      <!-- row C -->
      <g transform="translate(0,60)">
        <rect x="0" y="0" width="14" height="14" />
        <rect x="20" y="0" width="14" height="14" />
        <rect x="40" y="0" width="14" height="14" />
        <rect x="60" y="0" width="14" height="14" fill="#dddddd" stroke="none" />
        <rect x="80" y="0" width="14" height="14" fill="#dddddd" stroke="none" />
        <rect x="100" y="0" width="14" height="14" />
        <rect x="120" y="0" width="14" height="14" />
        <rect x="140" y="0" width="14" height="14" />
      </g>
      <!-- row D: two selected (hatched) -->
      <g transform="translate(0,90)">
        <rect x="0" y="0" width="14" height="14" />
        <rect x="20" y="0" width="14" height="14" />
        <rect x="40" y="0" width="14" height="14" />
        <rect x="60" y="0" width="14" height="14" stroke="#333333" stroke-width="2" />
        <rect x="80" y="0" width="14" height="14" stroke="#333333" stroke-width="2" />
        <rect x="100" y="0" width="14" height="14" />
        <rect x="120" y="0" width="14" height="14" />
        <rect x="140" y="0" width="14" height="14" />
      </g>
      <!-- row E -->
      <g transform="translate(0,120)">
        <rect x="0" y="0" width="14" height="14" />
        <rect x="20" y="0" width="14" height="14" />
        <rect x="40" y="0" width="14" height="14" />
        <rect x="60" y="0" width="14" height="14" />
        <rect x="80" y="0" width="14" height="14" />
        <rect x="100" y="0" width="14" height="14" />
        <rect x="120" y="0" width="14" height="14" />
        <rect x="140" y="0" width="14" height="14" />
      </g>
      <!-- row F -->
      <g transform="translate(0,150)">
        <rect x="0" y="0" width="14" height="14" />
        <rect x="20" y="0" width="14" height="14" />
        <rect x="40" y="0" width="14" height="14" />
        <rect x="60" y="0" width="14" height="14" />
        <rect x="80" y="0" width="14" height="14" />
        <rect x="100" y="0" width="14" height="14" />
        <rect x="120" y="0" width="14" height="14" />
        <rect x="140" y="0" width="14" height="14" fill="#dddddd" stroke="none" />
      </g>
    </g>
  </g>

  <!-- legend -->
  <g font-size="9" fill="#888888">
    <rect x="330" y="345" width="12" height="12" fill="none" stroke="#999999" />
    <text x="348" y="355">Available</text>
    <rect x="420" y="345" width="12" height="12" fill="none" stroke="#333333" stroke-width="2" />
    <text x="438" y="355">Selected</text>
    <rect x="510" y="345" width="12" height="12" fill="#dddddd" stroke="none" />
    <text x="528" y="355">Booked</text>
  </g>

  <line x1="260" y1="380" x2="640" y2="380" stroke="#cccccc" stroke-dasharray="4 3" />

  <!-- summary bar -->
  <g transform="translate(260,400)">
    <text x="0" y="14" font-size="10" fill="#888888">2 seats selected</text>
    <text x="0" y="32" font-size="14" fill="#333333">Rp 90.000</text>
    <rect x="270" y="4" width="110" height="30" fill="#dddddd" stroke="none" />
    <text x="295" y="24" font-size="9" fill="#666666">Continue</text>
  </g>

  <text x="30" y="600" font-size="10" fill="#aaaaaa">Low-fidelity wireframe — interactive seat map (available / selected / booked states)</text>
</svg>
