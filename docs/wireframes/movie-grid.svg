      <line x1="10" y1="245" x2="120" y2="245" stroke="#333333" />
      <line x1="10" y1="258" x2="90" y2="258" />
      <rect x="10" y="266" width="60" height="14" />
      <rect x="75" y="266" width="60" height="14" />
      <rect x="10" y="285" width="170" height="24" fill="#dddddd" stroke="none" />
      <text x="70" y="301" font-size="9" fill="#666666">Book Now</text>
    </g>
    <g transform="translate(240,130)">
      <rect width="190" height="260" />
      <rect x="10" y="10" width="170" height="220" stroke-dasharray="4 3" />
      <line x1="10" y1="245" x2="120" y2="245" stroke="#333333" />
      <line x1="10" y1="258" x2="90" y2="258" />
      <rect x="10" y="266" width="60" height="14" />
      <rect x="75" y="266" width="60" height="14" />
      <rect x="10" y="285" width="170" height="24" fill="#dddddd" stroke="none" />
      <text x="70" y="301" font-size="9" fill="#666666">Book Now</text>
    </g>
    <g transform="translate(450,130)">
      <rect width="190" height="260" />
      <rect x="10" y="10" width="170" height="220" stroke-dasharray="4 3" />
      <line x1="10" y1="245" x2="120" y2="245" stroke="#333333" />
      <line x1="10" y1="258" x2="90" y2="258" />
      <rect x="10" y="266" width="60" height="14" />
      <rect x="75" y="266" width="60" height="14" />
      <rect x="10" y="285" width="170" height="24" fill="#dddddd" stroke="none" />
      <text x="70" y="301" font-size="9" fill="#666666">Book Now</text>
    </g>
    <g transform="translate(660,130)">
      <rect width="190" height="260" />
      <rect x="10" y="10" width="170" height="220" stroke-dasharray="4 3" />
      <line x1="10" y1="245" x2="120" y2="245" stroke="#333333" />
      <line x1="10" y1="258" x2="90" y2="258" />
      <rect x="10" y="266" width="60" height="14" />
      <rect x="75" y="266" width="60" height="14" />
      <rect x="10" y="285" width="170" height="24" fill="#dddddd" stroke="none" />
      <text x="70" y="301" font-size="9" fill="#666666">Book Now</text>
    </g>

    <!-- row 2 (partial, indicates scroll continuation) -->
    <g transform="translate(30,410)">
      <rect width="190" height="120" stroke-dasharray="2 4" />
    </g>
    <g transform="translate(240,410)">
      <rect width="190" height="120" stroke-dasharray="2 4" />
    </g>
  </g>

  <text x="30" y="550" font-size="10" fill="#aaaaaa">Low-fidelity wireframe — movie listing grid (responsive: 2 / 3 / 4 columns)</text>
