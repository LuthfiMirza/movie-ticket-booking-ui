<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="560" fill="#ffffff" stroke="#bbbbbb" />

  <!-- header -->
  <rect x="30" y="24" width="140" height="20" rx="10" fill="none" stroke="#999999" />
  <text x="35" y="38" font-size="10" fill="#999999">NOW SHOWING</text>
  <rect x="30" y="56" width="220" height="28" fill="none" stroke="#333333" />
